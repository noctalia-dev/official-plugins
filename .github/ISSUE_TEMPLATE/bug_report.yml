name: Bug Report
description: Report a bug or regression in Noctalia
title: "[BUG] "
labels: ["bug"]

body:
  - type: checkboxes
    id: submission-checklist
    attributes:
      label: Submission checklist
      description: Please confirm the following before submitting.
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I am using the latest available version of Noctalia.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of the issue.
      placeholder: Describe the problem...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps required to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: |
        Paste any relevant logs, terminal output, or stack traces here.

        Examples:
        - journalctl output
        - terminal errors
        - crash logs

        Large outputs can be wrapped in a `<details>` block.
      render: text

  - type: input
    id: noctalia-version
    attributes:
      label: Noctalia version
      description: Enter the version shown by Noctalia, or the commit hash if you are running a development build.
      placeholder: "v5.x.x (commit hash)"
    validations:
      required: true

  - type: dropdown
    id: compositor
    attributes:
      label: Compositor
      description: Select the compositor where the issue occurs.
      options:
        - Niri
        - Hyprland
        - Sway
        - Scroll
        - Labwc
        - Mango
        - Other
    validations:
      required: true

  - type: dropdown
    id: distribution
    attributes:
      label: Distribution
      description: Select the Linux distribution family where the issue occurs.
      options:
        - Arch-based
        - Fedora-based
        - Debian-based
        - Gentoo-based
        - NixOS
        - openSUSE-based
        - Void
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment information
      description: |
        Please provide relevant system information:

        If you selected `Other` for distribution and/or compositor, please specify the exact one(s) here.
        - Installation method: e.g. AUR, source build, Nix
        - GPU: e.g. AMD RX 7800 XT (amdgpu)
      placeholder: |
        Installation method: e.g. AUR, source build, Nix
        GPU: e.g. AMD RX 7800 XT (amdgpu)
      render: text
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: |
        Add any other context, screenshots, or relevant information here.
